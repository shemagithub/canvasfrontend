kind = "web"
previewPath = "/"
title = "Car Rental"
version = "1.0.0"
id = "artifacts/car-rental"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22460

[services.development]
run = "pnpm --filter @workspace/car-rental run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/car-rental", "run", "build" ]
publicDir = "artifacts/car-rental/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22460"
BASE_PATH = "/"
